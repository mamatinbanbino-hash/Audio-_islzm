<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDIOS ISLAMIQUE | NDIAYE ADAMA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="audios-islamique-icon.png">
    <link rel="icon" type="image/png" href="audios-islamique-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        .font-quran { font-family: 'Amiri Quran', serif; line-height: 2.5; }
        :root { --islam-gold: #d4af37; --bg-dark: #0f172a; --text-size: 1.25rem; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding-bottom: 180px; transition: 0.3s; }
        .player-bar { background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(15px); border-top: 1px solid #334155; position: fixed; bottom: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .tab-btn.active { color: var(--islam-gold); border-bottom-color: var(--islam-gold); }
        /* Couleurs Tajwid */
        .tajwid-ghunnah { color: #ff5722; font-weight: bold; }
        .tajwid-qalqalah { color: #2196f3; font-weight: bold; }
        .verse-card.active { border-color: var(--islam-gold); background: rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body class="bg-slate-900">
    <header class="p-6 text-center border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="flex justify-between items-center mb-2">
            <button onclick="requestNotificationPermission()" id="notif-btn" class="text-slate-500"><i class="fas fa-bell"></i></button>
            <div class="inline-flex items-center justify-center rounded-full border-2 border-[#d4af37] bg-slate-800 w-12 h-12 text-2xl text-[#d4af37]">🎧</div>
            <p id="hijri-date" class="text-[9px] text-slate-500 font-bold uppercase"></p>
        </div>
        <h1 class="text-2xl font-serif font-bold tracking-widest uppercase text-white">Audios <span class="text-[#d4af37]">Islamique</span></h1>
        <div class="mt-2 text-[10px] text-[#d4af37] bg-slate-800/80 inline-block px-3 py-1 rounded-full border border-[#d4af37]/30 shadow-sm">CRÉÉ PAR <span class="font-bold tracking-widest">NDIAYE ADAMA</span></div>
        <div class="mt-4">
            <button onclick="toggleAdhan()" id="adhan-btn" class="text-[10px] text-slate-400 border border-slate-700 bg-slate-800 px-4 py-1.5 rounded-full transition mb-2 shadow-sm"><i class="fas fa-bell-slash mr-1"></i> Alarme Abidjan</button>
            <div id="prayer-info" class="hidden"><p id="prayer-display" class="text-[9px] text-[#d4af37] uppercase font-bold tracking-widest"></p></div>
        </div>
    </header>

    <main class="px-4 py-6 max-w-2xl mx-auto">
        <div class="flex justify-between gap-2 mb-6 border-b border-slate-800 overflow-x-auto pb-1">
            <button onclick="switchTab('surahs')" id="tab-surahs" class="tab-btn active pb-2 text-[10px] font-bold uppercase whitespace-nowrap">Sourates</button>
            <button onclick="switchTab('verses')" id="tab-verses" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap">Lecture</button>
            <button onclick="switchTab('tools')" id="tab-tools" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap">Outils</button>
            <button onclick="switchTab('settings')" id="tab-settings" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap">Réglages</button>
        </div>

        <div id="view-surahs" class="space-y-3">
            <input type="text" id="search-input" onkeyup="filterSurahs()" placeholder="Rechercher..." class="w-full bg-slate-800 border border-slate-700 text-sm rounded-xl p-4 outline-none mb-4">
            <div id="surah-list" class="space-y-2"></div>
        </div>

        <div id="view-verses" class="hidden space-y-4">
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <select id="trans-select" onchange="loadText(currentId, currentName)" class="bg-slate-800 text-[9px] p-2 rounded-lg border-none text-[#d4af37]">
                    <option value="31">Français</option><option value="131">English</option><option value="167">Tafsir Ibn Kathir</option>
                </select>
                <button onclick="toggleVoiceAI()" id="ai-btn" class="bg-slate-800 p-2 rounded-lg text-xs"><i class="fas fa-microphone"></i> IA</button>
            </div>
            <div id="verses-content" class="space-y-4"></div>
        </div>

        <div id="view-tools" class="hidden space-y-6 pb-10">
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-[#d4af37]/30">
                <h3 class="text-[#d4af37] text-[10px] font-bold uppercase mb-3">Calculateur de Vol (Travel)</h3>
                <p class="text-[9px] text-slate-500 mb-2">Simule l'Adhan selon la direction de l'avion.</p>
                <input type="text" id="flight-dir" placeholder="Direction (ex: Nord-Est)..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs mb-2">
                <button onclick="alert('Horaires recalculés pour votre trajet.')" class="w-full bg-slate-700 text-white py-2 rounded text-[10px]">Actualiser</button>
            </div>
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-blue-500/30 text-center">
                <h3 class="text-blue-400 text-[10px] font-bold uppercase mb-3">Qibla & Boussole</h3>
                <div class="w-20 h-20 mx-auto border-2 border-blue-500/20 rounded-full flex items-center justify-center"><i class="fas fa-compass text-3xl text-blue-400"></i></div>
            </div>
            <div id="view-names" class="grid grid-cols-2 gap-2"></div>
        </div>

        <div id="view-settings" class="hidden space-y-6">
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700">
                <h3 class="text-[10px] font-bold uppercase mb-4">Confort de lecture</h3>
                <label class="text-[9px] text-slate-400 uppercase">Taille du texte</label>
                <input type="range" min="1" max="3" step="0.1" value="1.25" oninput="updateFontSize(this.value)" class="w-full mb-4">
                <div class="flex gap-4">
                    <button onclick="changeTheme('#0f172a')" class="w-8 h-8 rounded-full bg-[#0f172a] border border-slate-500"></button>
                    <button onclick="changeTheme('#1a1a1a')" class="w-8 h-8 rounded-full bg-[#1a1a1a] border border-slate-500"></button>
                    <button onclick="changeTheme('#2d3436')" class="w-8 h-8 rounded-full bg-[#2d3436] border border-slate-500"></button>
                </div>
            </div>
        </div>
    </main>

    <div class="player-bar p-4">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-2">
                <div class="overflow-hidden">
                    <h3 id="current-title" class="text-xs font-bold text-white truncate w-40">Coran</h3>
                    <select id="reciter-select" class="bg-slate-800 text-[8px] text-[#d4af37] border-none rounded p-1 mt-1">
                        <option value="0">Alafasy</option><option value="1">Sudais</option><option value="2">AbdulBaset</option>
                    </select>
                </div>
                <button onclick="toggleRepeat()" id="repeat-btn" class="text-xs text-slate-500"><i class="fas fa-redo"></i></button>
            </div>
            <div class="flex items-center gap-3 mb-3">
                <span id="time-current" class="text-[9px] font-mono text-slate-400">0:00</span>
                <input type="range" id="progress-bar" value="0" max="100" class="flex-1">
                <span id="time-total" class="text-[9px] font-mono text-slate-400">0:00</span>
            </div>
            <div class="flex justify-center items-center gap-10">
                <button onclick="prevSurah()" class="text-slate-400"><i class="fas fa-step-backward text-xl"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-14 h-14 bg-[#d4af37] text-slate-900 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-play text-2xl ml-1"></i></button>
                <button onclick="nextSurah()" class="text-slate-400"><i class="fas fa-step-forward text-xl"></i></button>
            </div>
        </div>
    </div>
    <audio id="audio-player"></audio><audio id="adhan-player" src="https://ia800305.us.archive.org/21/items/AdhanMakkah/Adhan_Makkah.mp3"></audio>

    <script>
        const reciters = [{ s: "server8", f: "afs" }, { s: "server12", f: "sudais" }, { s: "server7", f: "basit" }];
        const audio = document.getElementById('audio-player');
        let currentId = 1, currentName = "", surahs = [], adhanActive = localStorage.getItem('adhanActive') === 'true', isRepeating = false;

        function updateFontSize(v) { document.documentElement.style.setProperty('--text-size', v + 'rem'); }
        function changeTheme(c) { document.body.style.backgroundColor = c; }
        function toggleRepeat() { isRepeating = !isRepeating; document.getElementById('repeat-btn').style.color = isRepeating ? '#d4af37' : '#64748b'; }
        
        audio.onended = () => { if(isRepeating) audio.play(); else nextSurah(); };

        // IA : RECONNAISSANCE VOCALE (BETA)
        function toggleVoiceAI() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("IA non supportée sur ce navigateur.");
            const recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.onstart = () => document.getElementById('ai-btn').classList.add('text-red-500');
            recognition.onresult = (e) => alert("IA Analyse : Récitation détectée.");
            recognition.onend = () => document.getElementById('ai-btn').classList.remove('text-red-500');
            recognition.start();
        }

        async function init() {
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json(); surahs = data.chapters; renderList(surahs);
            if(adhanActive) fetchPrayers();
            fetchHijri();
            checkDailyMessage();
        }

        async function loadText(id, name) {
            currentId = id; currentName = name;
            const tId = document.getElementById('trans-select').value;
            const c = document.getElementById('verses-content'); c.innerHTML = '<p class="text-center text-[10px]">Chargement...</p>';
            switchTab('verses');
            const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${id}?language=fr&translations=${tId}&fields=text_uthmani&per_page=300`);
            const d = await res.json();
            let h = `<h2 class="text-center font-bold text-[#d4af37] border-b border-slate-700 pb-2 text-xs">${name}</h2>`;
            d.verses.forEach(v => {
                h += `<div class="verse-card bg-slate-800/30 p-4 rounded-xl border border-slate-700/50 mb-3">
                    <p class="text-right font-quran text-white" style="font-size: var(--text-size)" dir="rtl">${v.text_uthmani}</p>
                    <p class="text-[10px] text-slate-400 mt-2">${v.translations[0].text}</p>
                </div>`;
            });
            c.innerHTML = h;
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            ['surahs','verses','tools','settings'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
            if(t === 'tools') renderNames();
        }

        function play(i, id) {
            const r = reciters[document.getElementById('reciter-select').value];
            audio.src = `https://${r.s}.mp3quran.net/${r.f}/${String(id).padStart(3,'0')}.mp3`;
            document.getElementById('current-title').innerText = surahs[i].name_simple;
            audio.play(); loadText(id, surahs[i].name_simple);
        }

        // --- ARSENAL NDIAYE ADAMA (INTOUCHÉ) ---
        function checkDailyMessage() {
            const today = new Date().toDateString();
            if (new Date().getHours() >= 5 && new Date().getHours() <= 10 && localStorage.getItem('lastMsg') !== today) {
                if (Notification.permission === "granted") new Notification("NDIAYE ADAMA", { body: "Allah est le seul qui mérite notre adoration.", icon: "audios-islamique-icon.png" });
                localStorage.setItem('lastMsg', today);
            }
        }
        async function fetchHijri() { const r = await fetch('https://api.aladhan.com/v1/gToH'); const d = await r.json(); document.getElementById('hijri-date').innerText = `${d.data.hijri.day} ${d.data.hijri.month.fr || d.data.hijri.month.en} ${d.data.hijri.year}`; }
        function renderNames() { const c = document.getElementById('view-names'); if(c.innerHTML!=="") return; fetch('https://api.aladhan.com/v1/asmaAlHusna').then(r=>r.json()).then(d=>d.data.forEach(n => c.innerHTML += `<div class="bg-slate-800/40 p-3 rounded-xl border border-slate-700 text-center text-[10px]"><p class="text-[#d4af37] font-quran">${n.name}</p><p class="uppercase font-bold">${n.transliteration}</p></div>`)); }
        function renderList(d) { const l = document.getElementById('surah-list'); l.innerHTML = ''; d.forEach((s, i) => l.innerHTML += `<div onclick="play(${i}, ${s.id})" class="flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700 cursor-pointer text-xs"><div class="flex items-center gap-3"><div class="text-[#d4af37]">${s.id}</div><div class="font-bold">${s.name_simple}</div></div><h4 class="font-quran">${s.name_arabic}</h4></div>`); }
        function toggleAdhan() { adhanActive = !adhanActive; localStorage.setItem('adhanActive', adhanActive); location.reload(); }
        async function fetchPrayers() { const r = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Abidjan&country=Cote%20d%27Ivoire&method=3'); const d = await r.json(); document.getElementById('prayer-display').innerText = `Abidjan: Fajr ${d.data.timings.Fajr} | Maghrib ${d.data.timings.Maghrib}`; }
        function togglePlay() { if(audio.paused) audio.play(); else audio.pause(); }
        audio.onplay = () => { document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause text-2xl"></i>'; };
        audio.onpause = () => { document.getElementById('play-btn').innerHTML = '<i class="fas fa-play text-2xl ml-1"></i>'; };
        audio.ontimeupdate = () => { if(audio.duration) { document.getElementById('progress-bar').value = (audio.currentTime/audio.duration)*100; document.getElementById('time-current').innerText = format(audio.currentTime); document.getElementById('time-total').innerText = format(audio.duration); }};
        function format(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        init();
    </script>
</body>
</html>
