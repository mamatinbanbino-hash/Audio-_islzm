<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDIOS ISLAMIQUE | Écoute Paisible</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3596/3596090.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3596/3596090.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></script>

    <style>
        /* AJOUT: Police Calligraphie Arabe */
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        .font-quran { font-family: 'Amiri Quran', serif; }

        :root { --islam-gold: #d4af37; --bg-dark: #0f172a; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 120px; -webkit-tap-highlight-color: transparent; }
        
        .player-bar { background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(15px); border-top: 1px solid #334155; position: fixed; bottom: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--islam-gold); cursor: pointer; margin-top: -5px; box-shadow: 0 0 10px rgba(212,175,55,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #475569; border-radius: 2px; }
        
        .playing-anim { display: inline-flex; gap: 3px; height: 15px; align-items: flex-end; }
        .playing-anim span { width: 3px; background-color: var(--islam-gold); animation: bounce 1s infinite ease-in-out; border-radius: 2px; }
        .playing-anim span:nth-child(1) { animation-delay: 0s; }
        .playing-anim span:nth-child(2) { animation-delay: 0.2s; }
        .playing-anim span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { height: 4px; } 50% { height: 15px; } }
    </style>
</head>
<body class="bg-slate-900">

    <header class="p-6 text-center border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="mb-3 inline-flex items-center justify-center rounded-full border-2 border-[#d4af37] shadow-[0_0_15px_rgba(212,175,55,0.2)] bg-slate-800 w-16 h-16 mx-auto text-3xl text-[#d4af37]">
            🎧
        </div>
        <h1 class="text-2xl font-serif font-bold tracking-widest uppercase text-white">Audios <span class="text-[#d4af37]">Islamique</span></h1>
        
        <div class="mt-2 text-[10px] text-[#d4af37] bg-slate-800/80 inline-block px-3 py-1 rounded-full border border-[#d4af37]/30 shadow-sm">
            <i class="fas fa-code mr-1"></i> Créé par <span class="font-bold tracking-widest">NDIAYE ADAMA</span>
        </div>
        
        <div class="mt-5 relative max-w-xs mx-auto">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <i class="fas fa-microphone text-slate-400 text-xs"></i>
            </div>
            <select id="reciter-select" onchange="changeReciter()" class="bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-xl focus:ring-[#d4af37] focus:border-[#d4af37] block w-full pl-9 p-3 outline-none appearance-none shadow-lg">
                <option value="https://server8.mp3quran.net/afs/">Mishary Rashid Alafasy</option>
                <option value="https://server11.mp3quran.net/sds/">Abdul Rahman Al-Sudais</option>
                <option value="https://server7.mp3quran.net/shur/">Saud Al-Shuraim</option>
                <option value="https://server7.mp3quran.net/basit/">Abdul Basit (Murattal)</option>
                <option value="https://server10.mp3quran.net/minsh/">Al-Minshawi</option>
            </select>
        </div>
    </header>

    <main class="px-4 py-6 max-w-2xl mx-auto">
        
        <div class="flex justify-center gap-8 mb-6 border-b border-slate-800">
            <button id="tab-surahs" onclick="switchTab('surahs')" class="pb-2 text-xs font-bold uppercase tracking-widest text-[#d4af37] border-b-2 border-[#d4af37] transition">Liste Sourates</button>
            <button id="tab-verses" onclick="switchTab('verses')" class="pb-2 text-xs font-bold uppercase tracking-widest text-slate-500 border-b-2 border-transparent transition">Texte (Lecture)</button>
        </div>

        <div id="view-surahs">
            <div class="mb-6 relative">
                <input type="text" id="search-input" onkeyup="filterSurahs()" placeholder="Rechercher une sourate (ex: Yasin, Kahf)..." class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-2xl focus:ring-1 focus:ring-[#d4af37] focus:border-[#d4af37] block pl-5 p-4 outline-none shadow-inner transition">
                <i class="fas fa-search absolute right-5 top-4 text-[#d4af37] text-lg"></i>
            </div>

            <div id="surah-list" class="space-y-3">
                <div class="text-center p-10 text-slate-500 mt-10">
                    <i class="fas fa-spinner fa-spin text-3xl mb-3 text-[#d4af37]"></i>
                    <p class="text-xs font-medium tracking-wide">Connexion aux serveurs...</p>
                </div>
            </div>
        </div>

        <div id="view-verses" class="hidden space-y-4 pb-10">
            <div class="text-center p-10 text-slate-500 mt-5 border border-dashed border-slate-700 rounded-2xl">
                <i class="fas fa-book-open text-3xl mb-3 text-slate-600"></i>
                <p class="text-xs font-medium tracking-wide">Lancez une sourate pour afficher le texte.</p>
            </div>
        </div>

    </main>

    <div class="player-bar p-4 shadow-2xl">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-3">
                <div class="overflow-hidden">
                    <h3 id="current-title" class="text-sm font-bold text-white truncate w-56">Sélectionnez une sourate</h3>
                    <p id="current-reciter" class="text-[10px] text-[#d4af37] mt-0.5">Aucune lecture en cours</p>
                </div>
                <div id="playing-indicator" class="playing-anim hidden">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="flex items-center gap-3 mb-3">
                <span id="time-current" class="text-[10px] font-mono text-slate-400 w-8">0:00</span>
                <input type="range" id="progress-bar" value="0" max="100" class="flex-1">
                <span id="time-total" class="text-[10px] font-mono text-slate-400 w-8 text-right">0:00</span>
            </div>

            <div class="flex justify-center items-center gap-8">
                <button onclick="prevSurah()" class="text-slate-400 hover:text-white active:scale-90 transition"><i class="fas fa-step-backward text-xl"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-14 h-14 bg-gradient-to-br from-[#d4af37] to-[#b49020] text-slate-900 rounded-full shadow-[0_0_15px_rgba(212,175,55,0.4)] flex items-center justify-center active:scale-90 transition">
                    <i class="fas fa-play text-2xl ml-1"></i>
                </button>
                <button onclick="nextSurah()" class="text-slate-400 hover:text-white active:scale-90 transition"><i class="fas fa-step-forward text-xl"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const progressBar = document.getElementById('progress-bar');
        const currentTitle = document.getElementById('current-title');
        const currentReciter = document.getElementById('current-reciter');
        const playingIndicator = document.getElementById('playing-indicator');
        
        let surahsData = [];
        let currentSurahIndex = -1;

        // AJOUT: Fonctionnalité pour basculer entre la liste et le texte
        function switchTab(tab) {
            if(tab === 'surahs') {
                document.getElementById('view-surahs').classList.remove('hidden');
                document.getElementById('view-verses').classList.add('hidden');
                document.getElementById('tab-surahs').className = "pb-2 text-xs font-bold uppercase tracking-widest text-[#d4af37] border-b-2 border-[#d4af37] transition";
                document.getElementById('tab-verses').className = "pb-2 text-xs font-bold uppercase tracking-widest text-slate-500 border-b-2 border-transparent transition";
            } else {
                document.getElementById('view-surahs').classList.add('hidden');
                document.getElementById('view-verses').classList.remove('hidden');
                document.getElementById('tab-verses').className = "pb-2 text-xs font-bold uppercase tracking-widest text-[#d4af37] border-b-2 border-[#d4af37] transition";
                document.getElementById('tab-surahs').className = "pb-2 text-xs font-bold uppercase tracking-widest text-slate-500 border-b-2 border-transparent transition";
            }
        }

        // AJOUT: Fonction pour récupérer le texte Arabe/Français et basculer auto
        async function loadVersesText(surahId, surahName) {
            const container = document.getElementById('view-verses');
            container.innerHTML = `<div class="text-center p-10"><i class="fas fa-spinner fa-spin text-3xl text-[#d4af37] mb-3"></i><p class="text-xs text-slate-400">Récupération des versets...</p></div>`;
            
            // Le fameux basculement automatique !
            switchTab('verses');

            try {
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${surahId}?language=fr&translations=31&fields=text_uthmani&per_page=300`);
                const data = await res.json();
                
                let html = `<h2 class="text-center text-xl font-bold text-[#d4af37] mb-6 border-b border-slate-700 pb-4">${surahName}</h2>`;
                
                if(surahId !== 1 && surahId !== 9) {
                    html += `<p class="text-center text-3xl font-quran text-white mb-8 leading-loose">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</p>`;
                }

                data.verses.forEach(verse => {
                    const frenchText = verse.translations[0]?.text || "";
                    const verseNumber = verse.verse_key.split(':')[1];
                    html += `
                    <div class="bg-slate-800/30 p-5 rounded-2xl border border-slate-700/50 hover:border-[#d4af37]/50 transition mb-4">
                        <div class="flex justify-between items-start gap-4 mb-4">
                            <span class="w-8 h-8 flex-shrink-0 rounded-full border border-[#d4af37] text-[#d4af37] flex items-center justify-center text-[10px] font-bold shadow-inner">${verseNumber}</span>
                            <p class="text-2xl font-quran text-white text-right leading-loose" dir="rtl">${verse.text_uthmani}</p>
                        </div>
                        <p class="text-xs text-slate-400 leading-relaxed border-t border-slate-700/50 pt-3">${frenchText}</p>
                    </div>
                    `;
                });
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<p class="text-red-400 text-center text-xs mt-10">⚠️ Impossible de charger le texte.</p>`;
            }
        }

        async function fetchSurahs() {
            try {
                const response = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
                const data = await response.json();
                surahsData = data.chapters;
                renderSurahList(surahsData); 
            } catch (error) {
                document.getElementById('surah-list').innerHTML = '<p class="text-red-400 text-center text-xs mt-10">⚠️ Erreur de connexion.</p>';
            }
        }

        // 🔍 FONCTION DE RECHERCHE
        function filterSurahs() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filteredData = surahsData.filter(surah => 
                surah.name_simple.toLowerCase().includes(query) || 
                surah.translated_name.name.toLowerCase().includes(query) ||
                surah.id.toString() === query
            );
            renderSurahList(filteredData);
        }

        // AFFICHAGE DYNAMIQUE
        function renderSurahList(dataToRender) {
            const listContainer = document.getElementById('surah-list');
            listContainer.innerHTML = '';

            if (dataToRender.length === 0) {
                listContainer.innerHTML = '<p class="text-slate-500 text-center text-xs mt-5">Aucune sourate trouvée.</p>';
                return;
            }

            dataToRender.forEach((surah) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-slate-800/40 hover:bg-slate-800 rounded-2xl cursor-pointer border border-slate-700/50 transition shadow-sm";
                div.onclick = () => playSurah(surah.id - 1); 
                
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-slate-900 text-[#d4af37] flex items-center justify-center text-xs font-bold border border-slate-700 shadow-inner">
                            ${surah.id}
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-slate-100">${surah.name_simple}</h4>
                            <p class="text-[10px] text-slate-400">${surah.translated_name.name}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <h4 class="text-lg font-arabic text-[#d4af37]">${surah.name_arabic}</h4>
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        function playSurah(index) {
            currentSurahIndex = index;
            const surah = surahsData[index];
            const reciterSelect = document.getElementById('reciter-select');
            const baseUrl = reciterSelect.value;
            
            const paddedNumber = String(surah.id).padStart(3, '0');
            const audioUrl = `${baseUrl}${paddedNumber}.mp3`;

            audio.src = audioUrl;
            currentTitle.innerText = `${surah.id}. ${surah.name_simple}`;
            currentReciter.innerText = reciterSelect.options[reciterSelect.selectedIndex].text;
            
            audio.play();
            updatePlayButton(true);
            setupMediaSession(surah);

            // AJOUT: Lance le chargement du texte dès que la sourate commence !
            loadVersesText(surah.id, surah.name_simple);
        }

        function togglePlay() {
            if (audio.src === "") {
                if(surahsData.length > 0) playSurah(0); 
                return;
            }
            if (audio.paused) {
                audio.play();
                updatePlayButton(true);
            } else {
                audio.pause();
                updatePlayButton(false);
            }
        }

        function nextSurah() {
            if (currentSurahIndex < surahsData.length - 1) playSurah(currentSurahIndex + 1);
        }

        function prevSurah() {
            if (currentSurahIndex > 0) playSurah(currentSurahIndex - 1);
        }

        function changeReciter() {
            if (currentSurahIndex !== -1 && !audio.paused) {
                const currentTime = audio.currentTime;
                playSurah(currentSurahIndex);
                audio.currentTime = currentTime; 
            } else if (currentSurahIndex !== -1) {
                currentReciter.innerText = document.getElementById('reciter-select').options[document.getElementById('reciter-select').selectedIndex].text;
                const surah = surahsData[currentSurahIndex];
                const baseUrl = document.getElementById('reciter-select').value;
                audio.src = `${baseUrl}${String(surah.id).padStart(3, '0')}.mp3`;
            }
        }

        function updatePlayButton(isPlaying) {
            if (isPlaying) {
                playBtn.innerHTML = '<i class="fas fa-pause text-2xl"></i>';
                playingIndicator.classList.remove('hidden');
            } else {
                playBtn.innerHTML = '<i class="fas fa-play text-2xl ml-1"></i>';
                playingIndicator.classList.add('hidden');
            }
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progressPercent;
                document.getElementById('time-current').innerText = formatTime(audio.currentTime);
                document.getElementById('time-total').innerText = formatTime(audio.duration);
            }
        });

        progressBar.addEventListener('input', (e) => {
            const seekTime = (e.target.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        audio.addEventListener('ended', nextSurah);

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function setupMediaSession(surah) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `${surah.id}. ${surah.name_simple}`,
                    artist: document.getElementById('reciter-select').options[document.getElementById('reciter-select').selectedIndex].text,
                    album: 'Audios Islamique',
                    artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/3596/3596090.png', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', prevSurah);
                navigator.mediaSession.setActionHandler('nexttrack', nextSurah);
            }
        }

        fetchSurahs();
    </script>
</body>
</html>
