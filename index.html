<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDIOS ISLAMIQUE | Écoute Paisible</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="apple-touch-icon" href="audios-islamique-icon.png">
    <link rel="icon" type="image/png" href="audios-islamique-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        .font-quran { font-family: 'Amiri Quran', serif; }
        :root { --islam-gold: #d4af37; --bg-dark: #0f172a; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 140px; -webkit-tap-highlight-color: transparent; }
        .player-bar { background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(15px); border-top: 1px solid #334155; position: fixed; bottom: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--islam-gold); cursor: pointer; margin-top: -5px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #475569; border-radius: 2px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 1rem; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* Animation Tasbih */
        .tap-effect:active { transform: scale(0.95); background-color: rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="bg-slate-900">

    <header class="p-6 text-center border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="mb-3 inline-flex items-center justify-center rounded-full border-2 border-[#d4af37] bg-slate-800 w-16 h-16 mx-auto text-3xl text-[#d4af37]">🎧</div>
        <h1 class="text-2xl font-serif font-bold tracking-widest uppercase text-white">Audios <span class="text-[#d4af37]">Islamique</span></h1>
        <div class="mt-2 text-[10px] text-[#d4af37] bg-slate-800/80 inline-block px-3 py-1 rounded-full border border-[#d4af37]/30 shadow-sm">
            <i class="fas fa-code mr-1"></i> Créé par <span class="font-bold tracking-widest">NDIAYE ADAMA</span>
        </div>
        <div class="mt-3 flex flex-col items-center gap-1">
            <button onclick="toggleAdhan()" id="adhan-btn" class="text-[10px] text-slate-400 border border-slate-700 bg-slate-800 px-3 py-1 rounded-full transition shadow-sm">
                <i class="fas fa-bell-slash mr-1"></i> Alarme Prière (Abidjan)
            </button>
            <p id="prayer-display" class="text-[9px] text-[#d4af37] hidden tracking-widest uppercase mt-1"></p>
        </div>
    </header>

    <main class="px-4 py-6 max-w-2xl mx-auto">
        <div id="bookmark-box" class="hidden mb-6 p-3 bg-[#d4af37]/10 border border-[#d4af37]/30 rounded-xl flex justify-between items-center">
            <p class="text-[10px] text-[#d4af37] uppercase font-bold"><i class="fas fa-bookmark mr-2"></i>Continuer l'écoute ?</p>
            <button onclick="resumeLastSurah()" id="resume-btn" class="text-[10px] bg-[#d4af37] text-slate-900 px-3 py-1 rounded-lg font-bold uppercase">Reprendre</button>
        </div>

        <div class="flex justify-center gap-4 mb-6 border-b border-slate-800 overflow-x-auto pb-1">
            <button id="tab-surahs" onclick="switchTab('surahs')" class="pb-2 text-xs font-bold uppercase text-[#d4af37] border-b-2 border-[#d4af37] whitespace-nowrap">Liste Sourates</button>
            <button id="tab-verses" onclick="switchTab('verses')" class="pb-2 text-xs font-bold uppercase text-slate-500 border-b-2 border-transparent whitespace-nowrap">Texte (Lecture)</button>
            <button id="tab-discover" onclick="switchTab('discover')" class="pb-2 text-xs font-bold uppercase text-slate-500 border-b-2 border-transparent whitespace-nowrap">Rappels & Tasbih</button>
        </div>

        <div id="view-surahs">
            <div class="mb-6 relative">
                <input type="text" id="search-input" onkeyup="filterSurahs()" placeholder="Rechercher une sourate..." class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-2xl block pl-5 p-4 outline-none">
                <i class="fas fa-search absolute right-5 top-4 text-[#d4af37]"></i>
            </div>
            <div id="surah-list" class="space-y-3"></div>
        </div>

        <div id="view-verses" class="hidden space-y-4 pb-10">
            <div class="text-center p-10 text-slate-500 mt-5 border border-dashed border-slate-700 rounded-2xl">
                <i class="fas fa-book-open text-3xl mb-3 text-slate-600"></i>
                <p class="text-xs font-medium tracking-wide">Sélectionnez une sourate.</p>
            </div>
        </div>

        <div id="view-discover" class="hidden space-y-6 pb-10">
            <div class="relative">
                <input type="text" id="discover-search" onkeyup="searchSubjects()" placeholder="Chercher un sujet (Prière, Mère...)" class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-xs rounded-xl p-3 outline-none">
            </div>

            <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-5 rounded-3xl border border-[#d4af37]/30 text-center shadow-xl">
                <h3 class="text-[#d4af37] text-[10px] font-bold uppercase mb-4 tracking-widest">Compteur Tasbih</h3>
                <div id="tasbih-display" class="text-4xl font-mono text-white mb-4">0</div>
                <div class="flex justify-center gap-4">
                    <button onclick="incrementTasbih()" class="w-20 h-20 rounded-full bg-[#d4af37] text-slate-900 flex items-center justify-center text-2xl shadow-lg tap-effect"><i class="fas fa-plus"></i></button>
                    <button onclick="resetTasbih()" class="w-10 h-10 mt-5 rounded-full bg-slate-700 text-white flex items-center justify-center text-xs shadow-md"><i class="fas fa-undo"></i></button>
                </div>
            </div>

            <div id="discover-content" class="space-y-6"></div>
        </div>
    </main>

    <div class="player-bar p-4 shadow-2xl">
        <div class="max-w-2xl mx-auto flex flex-col">
            <div class="flex justify-between items-center mb-3">
                <div class="overflow-hidden">
                    <h3 id="current-title" class="text-sm font-bold text-white truncate w-56">Sélectionnez une sourate</h3>
                    <p id="current-reciter" class="text-[10px] text-[#d4af37] mt-0.5">Mishary Rashid Alafasy</p>
                </div>
                <button onclick="shareApp()" class="text-[#d4af37] text-lg"><i class="fab fa-whatsapp"></i></button>
            </div>
            <div class="flex items-center gap-3 mb-3">
                <span id="time-current" class="text-[10px] font-mono text-slate-400">0:00</span>
                <input type="range" id="progress-bar" value="0" max="100" class="flex-1">
                <span id="time-total" class="text-[10px] font-mono text-slate-400">0:00</span>
            </div>
            <div class="flex justify-center items-center gap-8">
                <button onclick="prevSurah()" class="text-slate-400"><i class="fas fa-step-backward text-xl"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-14 h-14 bg-gradient-to-br from-[#d4af37] to-[#b49020] text-slate-900 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-play text-2xl ml-1"></i></button>
                <button onclick="nextSurah()" class="text-slate-400"><i class="fas fa-step-forward text-xl"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>
    <audio id="adhan-player" src="https://ia800305.us.archive.org/21/items/AdhanMakkah/Adhan_Makkah.mp3"></audio>

    <script>
        // --- DONNÉES ET LOGIQUE DÉCOUVERTE ---
        const rappels = [
            { t: "Le meilleur d'entre vous est celui qui apprend le Coran.", s: "Bukhari", tag: "Coran" },
            { t: "La prière à son heure est l'œuvre la plus aimée d'Allah.", s: "Muslim", tag: "Prière" },
            { t: "Le paradis est aux pieds des mères.", s: "Hadith", tag: "Mère Parents" },
            { t: "La patience est une lumière.", s: "Hadith", tag: "Patience" }
        ];
        const videos = ["60GfE5zN4m8", "k-K7n8y-S50", "m9h87XjXG_8"];

        function updateDiscover() {
            const r = rappels[Math.floor(Math.random()*rappels.length)];
            const v = videos[Math.floor(Math.random()*videos.length)];
            document.getElementById('discover-content').innerHTML = `
                <div class="bg-slate-800/60 p-4 rounded-3xl border border-[#d4af37]/20 shadow-lg">
                    <h3 class="text-[#d4af37] font-bold text-[10px] uppercase mb-3"><i class="fas fa-video mr-2"></i> Vidéo du moment</h3>
                    <div class="video-container"><iframe src="https://www.youtube.com/embed/${v}" frameborder="0" allowfullscreen></iframe></div>
                </div>
                <div class="bg-slate-800/40 p-5 rounded-2xl border border-[#d4af37]/30">
                    <div class="flex justify-between items-start">
                        <div><p class="text-sm italic text-slate-300">"${r.t}"</p><p class="text-[10px] mt-2 text-[#d4af37]">— ${r.s}</p></div>
                        <button onclick="shareVerse('${r.t}')" class="text-emerald-500 text-lg ml-4"><i class="fab fa-whatsapp"></i></button>
                    </div>
                </div>
            `;
        }

        function searchSubjects() {
            const q = document.getElementById('discover-search').value.toLowerCase();
            const container = document.getElementById('discover-content');
            if (q === "") { updateDiscover(); return; }
            let res = "";
            rappels.filter(r => r.tag.toLowerCase().includes(q) || r.t.toLowerCase().includes(q)).forEach(r => {
                res += `<div class="bg-slate-800/40 p-4 rounded-xl border border-[#d4af37]/20 mb-3"><p class="text-xs italic">"${r.t}"</p></div>`;
            });
            container.innerHTML = res || '<p class="text-center text-xs text-slate-500">Aucun résultat.</p>';
        }

        // --- NOUVEAUTÉ : LOGIQUE TASBIH ---
        let tasbihCount = parseInt(localStorage.getItem('tasbihAdama')) || 0;
        document.getElementById('tasbih-display').innerText = tasbihCount;
        function incrementTasbih() { tasbihCount++; updateTasbih(); }
        function resetTasbih() { tasbihCount = 0; updateTasbih(); }
        function updateTasbih() { 
            document.getElementById('tasbih-display').innerText = tasbihCount;
            localStorage.setItem('tasbihAdama', tasbihCount);
        }

        // --- NOUVEAUTÉ : LOGIQUE PARTAGE ---
        function shareVerse(text) {
            const url = `https://wa.me/?text=${encodeURIComponent("⭐ Rappel du jour (Audios Islamique) : " + text + "\n\nÉcoute le Coran ici : https://audio-islzm.vercel.app/")}`;
            window.open(url, '_blank');
        }
        function shareApp() {
            window.open("https://wa.me/?text=" + encodeURIComponent("Découvre 'Audios Islamique', l'appli créée par NDIAYE ADAMA pour écouter le Coran et l'Adhan en direct d'Abidjan ! 🇨🇮🕌\n👉 https://audio-islzm.vercel.app/"), '_blank');
        }

        // --- CORE LOGIQUE (INCHANGÉE & PERSISTANTE) ---
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const progressBar = document.getElementById('progress-bar');
        const currentTitle = document.getElementById('current-title');
        let surahsData = [];
        let currentSurahIndex = -1;
        let adhanEnabled = false;
        let abidjanPrayerTimes = [];

        function saveAdhanState(state) { localStorage.setItem('adhanAdamaActive', state); }
        function loadAdhanState() {
            if (localStorage.getItem('adhanAdamaActive') === 'true') {
                document.getElementById('adhan-btn').classList.add('text-[#d4af37]', 'border-[#d4af37]');
                document.getElementById('adhan-btn').innerHTML = '<i class="fas fa-bell mr-1"></i> Alarme Abidjan (Activée)';
                document.getElementById('prayer-display').classList.remove('hidden');
                adhanEnabled = true; fetchAbidjanPrayerTimes();
            }
        }

        function toggleAdhan() {
            const adhanAudio = document.getElementById('adhan-player');
            if (!adhanEnabled) {
                adhanAudio.volume = 0; adhanAudio.play().then(() => { adhanAudio.pause(); adhanAudio.volume = 1;
                adhanEnabled = true; saveAdhanState(true); location.reload(); });
            } else { adhanEnabled = false; saveAdhanState(false); location.reload(); }
        }

        async function fetchAbidjanPrayerTimes() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Abidjan&country=Cote%20d%27Ivoire&method=3');
                const data = await res.json();
                const t = data.data.timings;
                abidjanPrayerTimes = [t.Fajr, t.Dhuhr, t.Asr, t.Maghrib, t.Isha];
                document.getElementById('prayer-display').innerText = `Fajr ${t.Fajr} | Dhuhr ${t.Dhuhr} | Asr ${t.Asr} | Maghrib ${t.Maghrib} | Isha ${t.Isha}`;
            } catch (e) { abidjanPrayerTimes = ["05:00", "13:00", "16:00", "18:00", "19:00"]; }
        }

        setInterval(() => {
            if (!adhanEnabled) return;
            const now = new Date();
            const ct = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            if (abidjanPrayerTimes.includes(ct)) {
                const adhan = document.getElementById('adhan-player');
                if (adhan.paused) adhan.play();
            }
        }, 15000);

        function switchTab(tab) {
            ['surahs', 'verses', 'discover'].forEach(t => {
                document.getElementById('view-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).className = "pb-2 text-xs font-bold uppercase text-slate-500 border-b-2 border-transparent transition whitespace-nowrap";
            });
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).className = "pb-2 text-xs font-bold uppercase text-[#d4af37] border-b-2 border-[#d4af37] transition whitespace-nowrap";
            if(tab === 'discover') updateDiscover();
        }

        async function fetchSurahs() {
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json();
            surahsData = data.chapters;
            renderSurahList(surahsData);
            loadAdhanState();
            checkBookmark();
        }

        function renderSurahList(data) {
            const list = document.getElementById('surah-list'); list.innerHTML = '';
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700/50 cursor-pointer";
                div.onclick = () => playSurah(s.id - 1);
                div.innerHTML = `<div class="flex items-center gap-4"><div class="w-8 h-8 rounded-full border border-slate-700 flex items-center justify-center text-[10px] text-[#d4af37]">${s.id}</div><div class="text-white text-sm font-bold">${s.name_simple}</div></div><h4 class="text-lg font-arabic text-[#d4af37]">${s.name_arabic}</h4>`;
                list.appendChild(div);
            });
        }

        function playSurah(index) {
            currentSurahIndex = index; const s = surahsData[index];
            audio.src = `https://server8.mp3quran.net/afs/${String(s.id).padStart(3, '0')}.mp3`;
            currentTitle.innerText = `${s.id}. ${s.name_simple}`;
            audio.play(); updatePlayButton(true); loadVersesText(s.id, s.name_simple);
            localStorage.setItem('lastSurahId', index); // SAUVEGARDE MARQUE-PAGE
        }

        function checkBookmark() {
            const last = localStorage.getItem('lastSurahId');
            if(last !== null) document.getElementById('bookmark-box').classList.remove('hidden');
        }
        function resumeLastSurah() {
            const last = localStorage.getItem('lastSurahId');
            if(last !== null) { playSurah(parseInt(last)); document.getElementById('bookmark-box').classList.add('hidden'); }
        }

        async function loadVersesText(id, name) {
            const container = document.getElementById('view-verses'); container.innerHTML = `<p class="text-center text-xs p-10">Chargement...</p>`;
            switchTab('verses');
            const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${id}?language=fr&translations=31&fields=text_uthmani&per_page=300`);
            const data = await res.json();
            let html = `<h2 class="text-center font-bold text-[#d4af37] mb-6 border-b border-slate-700 pb-2">${name}</h2>`;
            data.verses.forEach(v => {
                html += `<div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50 mb-3"><p class="text-xl font-quran text-right leading-loose" dir="rtl">${v.text_uthmani}</p><p class="text-[11px] text-slate-400 mt-2">${v.translations[0].text}</p></div>`;
            });
            container.innerHTML = html;
        }

        function filterSurahs() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderSurahList(surahsData.filter(s => s.name_simple.toLowerCase().includes(q)));
        }

        function updatePlayButton(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; }
        audio.addEventListener('timeupdate', () => { if(audio.duration){ progressBar.value = (audio.currentTime/audio.duration)*100; document.getElementById('time-current').innerText = formatTime(audio.currentTime); document.getElementById('time-total').innerText = formatTime(audio.duration); } });
        function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        fetchSurahs();
    </script>
</body>
</html>
