<body class="bg-slate-900">

        <div id="view-surahs">

        <div id="view-tools" class="hidden space-y-8 pb-10">

                <button onclick="nextSurah()" class="text-slate-400 text-xl"><i class="fas fa-step-forward"></i></button>
            </div>
        </div>
    </div>

        // --- LES HADITHS ---
        const hadithsFull = [
            { ar: "إنما الأعمال بالنيات وإنما لكل امرئ ما نوى", fr: "Certes, les actions ne valent que par leurs intentions et chacun n'aura que ce qu'il a eu comme intention.", ref: "Rapporté par Al-Bukhari et Muslim" },

            { ar: "من كان يؤمن بالله واليوم الآخر فليقل خيرا أو ليصمت", fr: "Celui qui croit en Allah et au Jour dernier, qu'il dise du bien ou qu'il se taise.", ref: "Rapporté par Al-Bukhari" },

        // --- LES 25 HISTOIRES ---
        const prophetStories = {
            '1': { fr: "Adam", ar: "آدم", theme: "La Création et le Repentir", mir: "Apprentissage des noms", txt: "<h5>1. Le Contexte</h5><p>Allah créa Adam d'argile et lui insuffla la vie.</p><h5>2. L'Appel</h5><p>Allah ordonna aux anges de se prosterner devant lui par respect. Iblis refusa par orgueil.</p><h5>3. Le Message et Opposition</h5><p>Adam et Hawa furent placés au Paradis avec une seule interdiction : ne pas manger le fruit d'un arbre spécifique.</p><h5>4. Le Dénouement</h5><p>Trompés par Satan, ils mangèrent le fruit, mais ils exprimèrent un repentir immédiat et sincère.</p><h5>5. La Leçon</h5><p>L'homme est faillible, mais le repentir sincère (Tawba) efface le péché.</p>" },
            '2': { fr: "Idris", ar: "إدريس", theme: "La Sagesse et la Science", mir: "Premier Calame", txt: "<h5>1. Le Contexte</h5><p>Descendant d'Adam, Idris vécut dans une époque où la science commençait à naître.</p><h5>2. L'Appel</h5><p>Allah lui donna la prophétie pour guider les hommes vers la justice.</p><h5>3. Le Message</h5><p>Il fut le premier homme à utiliser le calame (plume) pour écrire et enseigna les mathématiques et l'astronomie.</p><h5>4. Le Dénouement</h5><p>Allah l'éleva à une position éminente au quatrième ciel.</p><h5>5. La Leçon</h5><p>L'importance de l'éducation et de la science dans la foi.</p>" },
            '3': { fr: "Nuh (Noé)", ar: "نوح", theme: "La Patience et la Persévérance", mir: "L'Arche", txt: "<h5>1. Le Contexte</h5><p>Le peuple de Nuh s'était détourné du monothéisme pour adorer des idoles.</p><h5>2. L'Appel</h5><p>Nuh prêcha pendant 950 ans sans relâche.</p><h5>3. Le Message</h5><p>Il appela son peuple à revenir à Allah, mais fut rejeté et moqué.</p><h5>4. Le Dénouement</h5><p>Allah lui ordonna de construire une arche. Le déluge purifia la terre, sauvant les croyants et les animaux.</p><h5>5. La Leçon</h5><p>La patience face au rejet et la confiance absolue en Allah.</p>" },
            '4': { fr: "Hud", ar: "هود", theme: "Force et Humilité", mir: "Le vent dévastateur", txt: "<h5>1. Le Contexte</h5><p>Envoyé aux 'Ad, un peuple de géants fiers de leurs constructions dans les montagnes.</p><h5>2. L'Appel</h5><p>Hud leur demanda d'être reconnaissants envers Allah pour leur force physique.</p><h5>3. Le Message</h5><p>Ils s'enorgueillirent et défièrent Allah.</p><h5>4. Le Dénouement</h5><p>Un vent glacial et rugissant détruisit tout pendant sept nuits et huit jours.</p><h5>5. La Leçon</h5><p>La puissance matérielle n'est rien face à la volonté divine.</p>" },
            '5': { fr: "Salih", ar: "صالح", theme: "Le Signe d'Allah", mir: "La Chamelle", txt: "<h5>1. Le Contexte</h5><p>Envoyé aux Thamud. Pour croire, ils exigèrent qu'une chamelle sorte d'un rocher.</p><h5>2. L'Appel</h5><p>Allah réalisa le miracle. Salih prévint de ne pas la blesser.</p><h5>3. Le Message</h5><p>Ils devaient partager l'eau avec la chamelle.</p><h5>4. Le Dénouement</h5><p>Ils tuèrent la chamelle. Un cri foudroyant tomba du ciel et les anéantit.</p><h5>5. La Leçon</h5><p>Ne jamais trahir les engagements pris envers Allah.</p>" },
            '6': { fr: "Ibrahim", ar: "إبراهيم", theme: "Père du Monothéisme", mir: "Feu froid", txt: "<h5>1. Le Contexte</h5><p>Né dans un peuple d'idolâtres dirigé par le tyran Nimrod.</p><h5>2. L'Appel</h5><p>Il comprit par la raison qu'Allah est l'Unique Maître de l'univers et brisa les idoles.</p><h5>3. Le Message et Opposition</h5><p>Nimrod le jeta dans un brasier géant. Allah ordonna au feu d'être paix et fraîcheur.</p><h5>4. Le Dénouement</h5><p>Il sortit indemne du feu et bâtit plus tard la Kaaba avec son fils Ismaïl.</p><h5>5. La Leçon</h5><p>La confiance absolue (Tawakkul) en Allah rend l'impossible possible.</p>" },
            '7': { fr: "Lut (Loth)", ar: "لوط", theme: "Pureté", mir: "Protection des Anges", txt: "<h5>1. Le Contexte</h5><p>Envoyé à Sodome, ville corrompue par des pratiques immorales et le vice.</p><h5>2. L'Appel</h5><p>Il appela son peuple à revenir à la décence et à la nature saine.</p><h5>3. Le Message</h5><p>Les habitants tentèrent d'agresser ses invités (qui étaient des anges déguisés).</p><h5>4. Le Dénouement</h5><p>La cité fut renversée car ils refusèrent tout repentir. Lut et ses filles furent sauvés.</p><h5>5. La Leçon</h5><p>Le courage de rester pur dans un monde corrompu est un acte de foi immense.</p>" },
            '8': { fr: "Ismaïl", ar: "إسماعيل", theme: "Soumission", mir: "Eau de Zamzam", txt: "<h5>1. Le Contexte</h5><p>Laissé bébé dans le désert de la Mecque avec sa mère Hajar sous l'ordre d'Allah.</p><h5>2. L'Appel</h5><p>Allah fit jaillir la source de Zamzam sous ses pieds pour les sauver de la soif.</p><h5>3. Le Message</h5><p>Accepta sans hésiter le rêve de son père qui devait le sacrifier : 'Fais ce qui t'est commandé'.</p><h5>4. Le Dénouement</h5><p>Allah le remplaça par un bélier et il aida son père à bâtir la Maison Sacrée.</p><h5>5. La Leçon</h5><p>La soumission totale au décret divin mène toujours à la délivrance.</p>" },
            '9': { fr: "Ishaq", ar: "إسحاق", theme: "Promesse Divine", mir: "Naissance tardive", txt: "<h5>1. Le Contexte</h5><p>Fils d'Ibrahim et Sarah, né alors que ses parents étaient très âgés et Sarah stérile.</p><h5>2. L'Appel</h5><p>Allah annonça sa naissance comme une bénédiction pour guider le peuple de Terre Sainte.</p><h5>3. Le Message</h5><p>Il maintint la tradition monothéiste et la prophétie parmi sa descendance.</p><h5>4. Le Dénouement</h5><p>Il devint l'ancêtre d'une lignée prestigieuse de prophètes (dont Yaqub et Yusuf).</p><h5>5. La Leçon</h5><p>Rien ne peut empêcher la réalisation d'une promesse d'Allah.</p>" },
            '10': { fr: "Yaqub (Jacob)", ar: "يعقوب", theme: "Espérance", mir: "Vision", txt: "<h5>1. Le Contexte</h5><p>Père de 12 fils qui allaient devenir les tribus d'Israël. Son fils préféré était Yusuf.</p><h5>2. L'Appel</h5><p>Il enseigna la patience et la foi constante à ses enfants malgré les épreuves.</p><h5>3. Le Message</h5><p>Après la perte de Yusuf, il pleura jusqu'à devenir aveugle mais garda toujours espoir.</p><h5>4. Le Dénouement</h5><p>La chemise de Yusuf lui rendit la vue et il retrouva son fils bien-aimé en Égypte.</p><h5>5. La Leçon</h5><p>L'espoir en Allah ne déçoit jamais, même après des décennies de douleur.</p>" },
            '11': { fr: "Yusuf (Joseph)", ar: "يوسف", theme: "Pardon", mir: "Interprétation des rêves", txt: "<h5>1. Le Contexte</h5><p>Trahis par ses frères, jeté dans un puits puis vendu comme esclave en Égypte.</p><h5>2. L'Appel</h5><p>Face à la tentation et à la prison injuste, il préféra garder son intégrité envers Allah.</p><h5>3. Le Message</h5><p>Interpréta les rêves du Roi et devint ministre pour sauver le pays de la famine.</p><h5>4. Le Dénouement</h5><p>Il pardonna magnifiquement à ses frères venus chercher de l'aide et réunit sa famille.</p><h5>5. La Leçon</h5><p>L'excellence du comportement (Ihsan) transforme l'esclavage en royauté.</p>" },
            '12': { fr: "Ayoub (Job)", ar: "أيوب", theme: "Endurance", mir: "Source curative", txt: "<h5>1. Le Contexte</h5><p>Prophète riche et heureux qui perdit soudainement ses biens, ses enfants et sa santé.</p><h5>2. L'Appel</h5><p>Atteint d'une maladie terrible, il resta en louange constante envers Allah sans se plaindre.</p><h5>3. Le Message</h5><p>'Le mal m'a touché, mais Tu es le plus Miséricordieux'. Sa foi fut inébranlable.</p><h5>4. Le Dénouement</h5><p>Allah lui ordonna de frapper le sol. Une source guérit son corps et ses biens furent doublés.</p><h5>5. La Leçon</h5><p>L'épreuve est un test de sincérité que seule l'endurance (Sabr) peut valider.</p>" },
            '13': { fr: "Shuayb", ar: "شعيب", theme: "Honnêteté", mir: "Le Châtiment de l'Ombre", txt: "<h5>1. Le Contexte</h5><p>Envoyé au peuple de Madyan qui truchait sur les balances dans leurs commerces.</p><h5>2. L'Appel</h5><p>Surnommé 'l'orateur des prophètes', il exhorta à l'honnêteté économique.</p><h5>3. Le Message</h5><p>Leur demanda de ne pas s'enrichir par le vol et de craindre le jour des comptes.</p><h5>4. Le Dénouement</h5><p>Ils refusèrent d'écouter et furent anéantis par un tremblement de terre et un nuage brûlant.</p><h5>5. La Leçon</h5><p>L'injustice économique et la triche finissent par détruire les sociétés.</p>" },
            '14': { fr: "Moussa (Moïse)", ar: "موسى", theme: "Libération", mir: "Mer fendue", txt: "<h5>1. Le Contexte</h5><p>Élevé chez Pharaon, il fut appelé par Allah au Mont Sinaï pour libérer son peuple.</p><h5>2. L'Appel</h5><p>Défia Pharaon avec son bâton devenu serpent et sa main devenue blanche.</p><h5>3. Le Message</h5><p>Demanda la liberté des enfants d'Israël et le retour au monothéisme pur.</p><h5>4. Le Dénouement</h5><p>Fendit la Mer Rouge pour sauver son peuple, alors que l'armée de Pharaon fut noyée.</p><h5>5. La Leçon</h5><p>Aucune puissance terrestre ne peut vaincre celui qui a l'aide d'Allah.</p>" },
            '15': { fr: "Haroun (Aaron)", ar: "هارون", theme: "Soutien", mir: "Éloquence", txt: "<h5>1. Le Contexte</h5><p>Frère de Moussa, choisi par Allah pour son éloquence afin d'aider son frère.</p><h5>2. L'Appel</h5><p>Il accompagna Moussa dans chaque épreuve face au tyran Pharaon.</p><h5>3. Le Message</h5><p>Tenta de maintenir la foi du peuple pendant l'absence de Moussa au Sinaï.</p><h5>4. Le Dénouement</h5><p>Il vécut et mourut comme un prophète respecté et un guide fidèle.</p><h5>5. La Leçon</h5><p>L'importance d'un bon compagnon et d'un soutien fraternel dans la mission.</p>" },
            '16': { fr: "Dhul-Kifl", ar: "ذو الكفل", theme: "Engagement", mir: "Patience", txt: "<h5>1. Le Contexte</h5><p>Prophète mentionné parmi les patients et les bons dans le Coran.</p><h5>2. L'Appel</h5><p>Il prit l'engagement de jeûner le jour et prier la nuit sans jamais s'énerver.</p><h5>3. Le Message</h5><p>Respecta ses serments malgré les provocations de Satan (Iblis).</p><h5>4. Le Dénouement</h5><p>Fut compté par Allah parmi les élus pour sa fidélité à ses promesses.</p><h5>5. La Leçon</h5><p>La maîtrise de soi et le respect de la parole donnée sont des actes de foi.</p>" },
            '17': { fr: "Dawud (David)", ar: "داوود", theme: "Dévotion", mir: "Fer ramolli", txt: "<h5>1. Le Contexte</h5><p>Jeune berger courageux qui tua Goliath avec une fronde pour sauver son peuple.</p><h5>2. L'Appel</h5><p>Devenu Roi, il reçut les Psaumes (Zabur) et chantait les louanges d'Allah.</p><h5>3. Le Message</h5><p>Allah rendit le fer malléable dans ses mains pour qu'il fabrique des armures.</p><h5>4. Le Dénouement</h5><p>Fut un souverain juste, partageant son temps entre le gouvernement et l'adoration.</p><h5>5. La Leçon</h5><p>La puissance politique ne doit jamais détourner de l'adoration de Dieu.</p>" },
            '18': { fr: "Sulayman (Salomon)", ar: "سليمان", theme: "Sagesse", mir: "Langage des animaux", txt: "<h5>1. Le Contexte</h5><p>Fils de Dawud, il hérita de sa sagesse et de son royaume immense.</p><h5>2. L'Appel</h5><p>Allah lui donna le pouvoir sur les djinns, le vent et la compréhension des animaux.</p><h5>3. Le Message</h5><p>Utilisa ses dons pour guider la Reine de Saba et les nations vers l'Islam.</p><h5>4. Le Dénouement</h5><p>Gouverna avec une justice parfaite et bâtit le temple d'Al-Aqsa.</p><h5>5. La Leçon</h5><p>Chaque don divin est une responsabilité pour établir la justice.</p>" },
            '19': { fr: "Ilyas (Élie)", ar: "إلياس", theme: "Courage", mir: "Ciel sans pluie", txt: "<h5>1. Le Contexte</h5><p>Envoyé aux habitants de Baalbek qui adoraient l'idole Baal.</p><h5>2. L'Appel</h5><p>Les avertit contre l'idolâtrie et appela au culte de l'Unique Créateur.</p><h5>3. Le Message</h5><p>Défia les prêtres païens pour montrer l'impuissance de leurs idoles.</p><h5>4. Le Dénouement</h5><p>Fut protégé par Allah des persécutions des rois injustes de son époque.</p><h5>5. La Leçon</h5><p>Dire la vérité face à une majorité égarée demande un courage immense.</p>" },
            '20': { fr: "Al-Yasa (Élisée)", ar: "اليسع", theme: "Continuité", mir: "Guérisons", txt: "<h5>1. Le Contexte</h5><p>Successeur d'Ilyas, il fut chargé de continuer la guidance de son peuple.</p><h5>2. L'Appel</h5><p>Allah lui donna la prophétie et la sagesse pour maintenir la Loi divine.</p><h5>3. Le Message</h5><p>Appela les gens à la droiture et soigna de nombreux malades par miracle.</p><h5>4. Le Dénouement</h5><p>Allah l'a cité parmi les meilleurs et les plus vertueux dans Son Livre.</p><h5>5. La Leçon</h5><p>La guidance est un flambeau qui doit être transmis sans cesse.</p>" },
            '21': { fr: "Yunus (Jonas)", ar: "يونس", theme: "Repentir", mir: "Le Poisson", txt: "<h5>1. Le Contexte</h5><p>Envoyé à Ninive, il quitta la ville sans permission avant le châtiment prévu.</p><h5>2. L'Appel</h5><p>Avalé par un grand poisson, il invoqua Allah dans les ténèbres les plus totales.</p><h5>3. Le Message</h5><p>'Pas de divinité à part Toi ! Gloire à Toi ! J'étais parmi les injustes'.</p><h5>4. Le Dénouement</h5><p>Allah le fit recracher et il retourna vers son peuple qui finit par croire.</p><h5>5. La Leçon</h5><p>Même dans les situations les plus sombres, l'invocation sincère sauve.</p>" },
            '22': { fr: "Zakariya (Zacharie)", ar: "زكريا", theme: "Prière", mir: "Fils tardif", txt: "<h5>1. Le Contexte</h5><p>Vieux prêtre pieux, tuteur de Maryam, sans héritier pour porter son message.</p><h5>2. L'Appel</h5><p>Pria Allah secrètement avec une humilité profonde malgré son âge avancé.</p><h5>3. Le Message</h5><p>L'ange lui annonça Yahya alors que sa femme était stérile.</p><h5>4. Le Dénouement</h5><p>Le miracle eut lieu, prouvant que les lois de la nature sont soumises à Allah.</p><h5>5. La Leçon</h5><p>La prière humble est la clé qui ouvre les portes de l'impossible.</p>" },
            '23': { fr: "Yahya (Jean)", ar: "يحيى", theme: "Pureté", mir: "Sagesse précoce", txt: "<h5>1. Le Contexte</h5><p>Fils de Zakariya, il reçut la sagesse et la connaissance dès son enfance.</p><h5>2. L'Appel</h5><p>Fut un prophète ascète, doux et compatissant, détaché des plaisirs du monde.</p><h5>3. Le Message</h5><p>Annonça la venue du Messie Issa et prêcha le repentir sincère.</p><h5>4. Le Dénouement</h5><p>Mourut en martyr pour avoir défendu la Loi d'Allah face à un roi injuste.</p><h5>5. La Leçon</h5><p>La vérité a un prix, mais elle offre une dignité éternelle devant Dieu.</p>" },
            '24': { fr: "Issa (Jésus)", ar: "عيسى", theme: "Le Signe", mir: "Parole au berceau", txt: "<h5>1. Le Contexte</h5><p>Né miraculeusement de Maryam par l'ordre d'Allah 'Sois !', sans père.</p><h5>2. L'Appel</h5><p>Parla dès le berceau pour défendre sa mère et guérit les aveugles plus tard.</p><h5>3. Le Message</h5><p>Apporta l'Évangile (Injil) pour rappeler l'esprit de la Loi divine.</p><h5>4. Le Dénouement</h5><p>Allah l'éleva vers Lui alors que ses ennemis tentaient de le tuer.</p><h5>5. La Leçon</h5><p>Issa est un souffle de Dieu et un signe de Sa puissance illimitée.</p>" },
            '25': { fr: "Muhammad (SAW)", ar: "محمد", theme: "Le Sceau", mir: "Le Saint Coran", txt: "<h5>1. Le Contexte</h5><p>Né à la Mecque dans une société idolâtre et injuste.</p><h5>2. L'Appel</h5><p>À 40 ans, l'ange Jibril lui révéla les premiers versets dans la grotte de Hira.</p><h5>3. Le Message</h5><p>Pendant 23 ans, il transmit le Coran et établit la justice et la miséricorde.</p><h5>4. Le Dénouement</h5><p>Il retourna triomphant à la Mecque et compléta la religion pour l'humanité.</p><h5>5. La Leçon</h5><p>Il est le modèle parfait et le dernier messager pour tous les mondes.</p>" }
        };

        // --- FONCTIONS LOGIQUE ---

        function initProphetList() {
            const list = document.getElementById('prophet-list');
            list.innerHTML = '';
            Object.keys(prophetStories).forEach(key => {
                const p = prophetStories[key];
                list.innerHTML += `
                <button onclick="showStory('${key}')" class="text-left bg-slate-800 border border-slate-700 p-4 rounded-xl active:scale-95 transition shadow-lg">
                    <span class="text-[9px] text-slate-500 block mb-1 font-bold uppercase tracking-widest">N°${key}</span>
                    <span class="text-white font-bold text-[11px] block">${p.fr}</span>
                    <span class="text-[#d4af37] font-quran text-lg">${p.ar}</span>
                </button>`;
            });
        }

        function renderHadiths() {
            const list = document.getElementById('hadith-full-list');
            list.innerHTML = '';
            hadithsFull.forEach(h => {
                list.innerHTML += `<div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700 shadow-md">
                    <p class="text-right font-quran text-lg text-[#d4af37] mb-3" dir="rtl">${h.ar}</p>
                    <p class="text-xs text-white leading-relaxed italic mb-2">"${h.fr}"</p>
                    <p class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">Source: ${h.ref}</p>
                </div>`;
            });
        }

        function showStory(key) {
            document.getElementById('prophet-list').classList.add('hidden');
            const display = document.getElementById('story-display');
            const p = prophetStories[key];
            document.getElementById('story-title').innerText = `${p.fr} (${p.ar})`;
            document.getElementById('story-text').innerHTML = `<div class="story-badge"><i class="fas fa-star mr-2"></i> ${p.theme}</div><div class="mt-4">${p.txt}</div>`;
            display.classList.remove('hidden');
            window.scrollTo({ top: display.offsetTop - 50, behavior: 'smooth' });
        }

        function closeStory() {
            document.getElementById('story-display').classList.add('hidden');
            document.getElementById('prophet-list').classList.remove('hidden');
        }

        function renderNames() {
            const c = document.getElementById('view-names');
            c.innerHTML = '';
            asmaUlHusna.forEach(n => {
                c.innerHTML += `<div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800 text-center shadow-inner">
                    <p class="text-[#d4af37] font-quran text-xl mb-1">${n.n}</p>
                    <p class="text-white text-[10px] font-bold uppercase tracking-widest">${n.t}</p>
                    <p class="text-slate-500 text-[9px] mt-1 italic">${n.m}</p>
                </div>`;
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            ['surahs','hadiths','tasbih','tools'].forEach(v => {
                const el = document.getElementById('view-'+v);
                if(el) el.classList.add('hidden');
            });
            document.getElementById('view-'+t).classList.remove('hidden');
            if(t === 'tools') { renderNames(); initProphetList(); }
            if(t === 'hadiths') renderHadiths();
        }

        async function init() {
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json(); surahs = data.chapters; renderList(surahs);
        }

        function renderList(d) { 
            const l = document.getElementById('surah-list'); l.innerHTML = ''; 
            d.forEach((s, i) => l.innerHTML += `<div onclick="play(${i}, ${s.id})" class="flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700 cursor-pointer hover:border-[#d4af37] transition">
                <div class="flex items-center gap-4"><div class="w-8 h-8 rounded-full bg-slate-900 flex items-center justify-center text-[10px] text-[#d4af37] font-bold border border-slate-700">${s.id}</div><div class="text-white text-sm font-bold">${s.name_simple}</div></div>
                <div class="text-right"><h4 class="text-xl font-quran text-[#d4af37]">${s.name_arabic}</h4></div></div>`); 
        }

        function play(i, id) {
            currentIdx = i; const r = reciters[document.getElementById('reciter-select').value];
            audio.src = `https://${r.s}.mp3quran.net/${r.f}/${String(id).padStart(3,'0')}.mp3`;
            document.getElementById('current-title').innerText = surahs[i].name_simple;
            audio.play(); updateBtn(true);
        }

        function togglePlay() { if(audio.paused) audio.play(); else audio.pause(); }
        function updateBtn(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; }
        audio.onplay = () => updateBtn(true); audio.onpause = () => updateBtn(false);
        audio.ontimeupdate = () => { if(audio.duration) { document.getElementById('progress-bar').value = (audio.currentTime/audio.duration)*100; } };
        function incrementTasbih() { let c = parseInt(localStorage.getItem('tCount')) || 0; c++; document.getElementById('tasbih-display').innerText = c; localStorage.setItem('tCount', c); if(window.navigator.vibrate) window.navigator.vibrate(50); }
        function resetTasbih() { if(confirm("Réinitialiser ?")) { document.getElementById('tasbih-display').innerText = 0; localStorage.setItem('tCount', 0); } }

        window.addEventListener('DOMContentLoaded', () => {
            const name = localStorage.getItem('userName');
            if (!name) document.getElementById('register-screen').style.display = 'flex';
            else { document.getElementById('current-user-name').innerText = name; init(); }
        });

        async function confirmRegistration() {
            const name = document.getElementById('user-input-field').value.trim();
            if (name.length < 2) return;
            localStorage.setItem('userName', name);
            document.getElementById('register-screen').style.display = 'none';
            document.getElementById('current-user-name').innerText = name;
            // Ton bot Telegram
            try { await fetch(`https://api.telegram.org/bot8415739489:AAGHOg0uswu994t5lxSZ8-N01SW6eZ11v0I/sendMessage?chat_id=6224971749&text=${encodeURIComponent("🚀 Nouvel utilisateur : " + name)}`); } catch(e){}
            init();
        }

        function shareApp() { navigator.share({title:'Audios Islamique', text:'App par Ndiaye Adama', url:location.href}); }
        function toggleAdhan() { adhanActive = !adhanActive; localStorage.setItem('adhanActive', adhanActive); location.reload(); }
        function nextSurah() { if(currentIdx < surahs.length -1) play(currentIdx + 1, surahs[currentIdx + 1].id); }
        function prevSurah() { if(currentIdx > 0) play(currentIdx - 1, surahs[currentIdx - 1].id); }
    </script>
</body>
</html>
