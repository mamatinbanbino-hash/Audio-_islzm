<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDIOS ISLAMIQUE | NDIAYE ADAMA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="audios-islamique-icon.png">
    <link rel="icon" type="image/png" href="audios-islamique-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        .font-quran { font-family: 'Amiri Quran', serif; }
        :root { --islam-gold: #d4af37; --bg-dark: #0f172a; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding-bottom: 140px; }
        
        .player-bar { background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(15px); border-top: 1px solid #334155; position: fixed; bottom: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 1.5rem; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--islam-gold); cursor: pointer; margin-top: -5px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #475569; border-radius: 2px; }
    </style>
</head>
<body class="bg-slate-900">

    <header class="p-6 text-center border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="mb-3 inline-flex items-center justify-center rounded-full border-2 border-[#d4af37] bg-slate-800 w-16 h-16 mx-auto text-3xl text-[#d4af37]">🎧</div>
        <h1 class="text-2xl font-serif font-bold tracking-widest uppercase text-white">Audios <span class="text-[#d4af37]">Islamique</span></h1>
        <div class="mt-2 text-[10px] text-[#d4af37] bg-slate-800/80 inline-block px-3 py-1 rounded-full border border-[#d4af37]/30">
            <i class="fas fa-code mr-1"></i> Créé par <span class="font-bold tracking-widest">NDIAYE ADAMA</span>
        </div>
        <div class="mt-3">
            <button onclick="toggleAdhan()" id="adhan-btn" class="text-[10px] text-slate-400 border border-slate-700 bg-slate-800 px-4 py-1 rounded-full transition shadow-sm">
                <i class="fas fa-bell-slash mr-1"></i> Alarme Prière (Abidjan)
            </button>
            <p id="prayer-display" class="text-[9px] text-[#d4af37] hidden tracking-widest uppercase mt-1 font-bold"></p>
        </div>
    </header>

    <main class="px-4 py-6 max-w-2xl mx-auto">
        <div class="flex justify-center gap-4 mb-6 border-b border-slate-800 overflow-x-auto pb-1">
            <button id="tab-surahs" onclick="switchTab('surahs')" class="pb-2 text-xs font-bold uppercase text-[#d4af37] border-b-2 border-[#d4af37] whitespace-nowrap">Sourates</button>
            <button id="tab-verses" onclick="switchTab('verses')" class="pb-2 text-xs font-bold uppercase text-slate-500 border-b-2 border-transparent whitespace-nowrap">Lecture</button>
            <button id="tab-discover" onclick="switchTab('discover')" class="pb-2 text-xs font-bold uppercase text-slate-500 border-b-2 border-transparent whitespace-nowrap">Découverte</button>
        </div>

        <div id="view-surahs">
            <div id="bookmark-box" class="hidden mb-6 p-3 bg-[#d4af37]/10 border border-[#d4af37]/30 rounded-xl flex justify-between items-center">
                <p class="text-[10px] text-[#d4af37] uppercase font-bold">Reprendre l'écoute ?</p>
                <button onclick="resumeLastSurah()" class="text-[10px] bg-[#d4af37] text-slate-900 px-3 py-1 rounded-lg font-bold">REPRENDRE</button>
            </div>
            <input type="text" id="search-input" onkeyup="filterSurahs()" placeholder="Rechercher une sourate..." class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-2xl p-4 outline-none mb-6 shadow-inner">
            <div id="surah-list" class="space-y-3"></div>
        </div>

        <div id="view-verses" class="hidden space-y-4">
            <div class="text-center p-10 text-slate-500 border border-dashed border-slate-700 rounded-2xl text-xs uppercase font-bold">Sélectionnez une sourate</div>
        </div>

        <div id="view-discover" class="hidden space-y-6 pb-10">
            <div class="bg-slate-800/40 p-5 rounded-3xl border border-[#d4af37]/20 text-center shadow-lg">
                <h3 class="text-[#d4af37] text-[10px] font-bold uppercase mb-4 tracking-widest">Tasbih numérique</h3>
                <div id="tasbih-display" class="text-5xl font-mono text-white mb-4">0</div>
                <button onclick="incrementTasbih()" class="w-20 h-20 rounded-full bg-[#d4af37] text-slate-900 flex items-center justify-center text-3xl shadow-xl active:scale-90 mx-auto transition"><i class="fas fa-plus"></i></button>
                <button onclick="resetTasbih()" class="block mx-auto mt-4 text-[9px] text-slate-500 uppercase">Reset</button>
            </div>

            <div class="relative">
                <input type="text" id="discover-search" onkeyup="searchSubjects()" placeholder="Chercher un sujet (Prière, Mère, Patience, Foi)..." class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-xs rounded-xl p-3 outline-none">
                <i class="fas fa-search absolute right-4 top-3.5 text-slate-500"></i>
            </div>

            <div id="discover-content" class="space-y-6"></div>
        </div>
    </main>

    <div class="player-bar p-4">
        <div class="max-w-2xl mx-auto flex flex-col">
            <div class="flex justify-between items-center mb-3">
                <div class="overflow-hidden">
                    <h3 id="current-title" class="text-sm font-bold text-white truncate w-52">Choisir une sourate</h3>
                    <p class="text-[10px] text-[#d4af37]">Mishary Rashid Alafasy</p>
                </div>
                <div id="playing-indicator" class="playing-anim hidden"><span></span><span></span><span></span></div>
            </div>
            <div class="flex items-center gap-3 mb-3">
                <span id="time-current" class="text-[10px] font-mono text-slate-400">0:00</span>
                <input type="range" id="progress-bar" value="0" max="100" class="flex-1">
                <span id="time-total" class="text-[10px] font-mono text-slate-400">0:00</span>
            </div>
            <div class="flex justify-center items-center gap-10">
                <button onclick="prevSurah()" class="text-slate-400"><i class="fas fa-step-backward text-xl"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-14 h-14 bg-[#d4af37] text-slate-900 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-play text-2xl ml-1"></i></button>
                <button onclick="nextSurah()" class="text-slate-400"><i class="fas fa-step-forward text-xl"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>
    <audio id="adhan-player" src="https://ia800305.us.archive.org/21/items/AdhanMakkah/Adhan_Makkah.mp3"></audio>

    <script>
        // --- BASE DE DONNÉES THÉMATIQUE (VIDÉOS ET TEXTES) ---
        const bdd = [
            { subject: "Prière", video: "k-K7n8y-S50", text: "La prière à son heure est l'œuvre la plus aimée d'Allah.", source: "Muslim" },
            { subject: "Patience", video: "60GfE5zN4m8", text: "La patience est une lumière dans l'obscurité des épreuves.", source: "Hadith" },
            { subject: "Parents", video: "m9h87XjXG_8", text: "Le paradis se trouve aux pieds de ta mère.", source: "Hadith" },
            { subject: "Foi", video: "U9_8V6XfP7w", text: "La foi consiste à adorer Allah comme si tu Le voyais.", source: "Hadith" },
            { subject: "Comportement", video: "wM6h_w7_1kI", text: "Le meilleur d'entre vous est celui qui a le meilleur comportement.", source: "Bukhari" },
            { subject: "Coran", video: "60GfE5zN4m8", text: "Celui qui lit une lettre du Coran reçoit dix bonnes actions.", source: "Tirmidhi" }
        ];

        function updateDiscover(filtered = null) {
            const data = filtered || [bdd[Math.floor(Math.random()*bdd.length)]];
            let html = "";
            data.forEach(item => {
                html += `
                    <div class="bg-slate-800/60 p-4 rounded-3xl border border-[#d4af37]/20 shadow-xl mb-4">
                        <h3 class="text-[#d4af37] font-bold text-[10px] uppercase mb-3"><i class="fas fa-video mr-2"></i> Sujet : ${item.subject}</h3>
                        <div class="video-wrapper">
                            <iframe src="https://www.youtube.com/embed/${item.video}?rel=0" allowfullscreen></iframe>
                        </div>
                    </div>
                    <div class="bg-slate-800/40 p-5 rounded-2xl border border-[#d4af37]/30 mb-6">
                        <p class="text-sm italic text-slate-300">"${item.text}"</p>
                        <p class="text-[10px] text-right mt-2 text-[#d4af37]">— ${item.source}</p>
                    </div>
                `;
            });
            if(!filtered) html += `<button onclick="updateDiscover()" class="w-full py-4 bg-slate-800 border border-slate-700 rounded-2xl text-[10px] uppercase font-bold text-slate-400">Autre sujet au hasard</button>`;
            document.getElementById('discover-content').innerHTML = html;
        }

        function searchSubjects() {
            const q = document.getElementById('discover-search').value.toLowerCase();
            if(q === "") { updateDiscover(); return; }
            const res = bdd.filter(item => item.subject.toLowerCase().includes(q) || item.text.toLowerCase().includes(q));
            updateDiscover(res.length > 0 ? res : null);
            if(res.length === 0) document.getElementById('discover-content').innerHTML = '<p class="text-center text-xs text-slate-500">Aucun sujet trouvé.</p>';
        }

        // --- TASBIH & MÉMOIRE ---
        let tasbih = parseInt(localStorage.getItem('tasbihAdama')) || 0;
        document.getElementById('tasbih-display').innerText = tasbih;
        function incrementTasbih() { tasbih++; document.getElementById('tasbih-display').innerText = tasbih; localStorage.setItem('tasbihAdama', tasbih); }
        function resetTasbih() { tasbih = 0; document.getElementById('tasbih-display').innerText = 0; localStorage.setItem('tasbihAdama', 0); }

        // --- ALARME PERSISTANTE ---
        let adhanActive = localStorage.getItem('adhanActive') === 'true';
        function toggleAdhan() {
            const a = document.getElementById('adhan-player');
            if(!adhanActive) {
                a.volume = 0; a.play().then(() => { a.pause(); a.volume = 1; adhanActive = true; localStorage.setItem('adhanActive', true); location.reload(); });
            } else { adhanActive = false; localStorage.setItem('adhanActive', false); location.reload(); }
        }

        async function fetchPrayers() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Abidjan&country=Cote%20d%27Ivoire&method=3');
                const data = await res.json();
                const t = data.data.timings;
                document.getElementById('prayer-display').innerText = `Fajr ${t.Fajr} | Dhuhr ${t.Dhuhr} | Asr ${t.Asr} | Maghrib ${t.Maghrib} | Isha ${t.Isha}`;
                if(adhanActive) document.getElementById('prayer-display').classList.remove('hidden');
            } catch (e) {}
        }

        // --- LECTEUR ET LOGIQUE CORE ---
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        let surahs = [];
        let currentIndex = -1;

        function switchTab(t) {
            ['surahs', 'verses', 'discover'].forEach(v => {
                document.getElementById('view-' + v).classList.add('hidden');
                document.getElementById('tab-' + v).className = "pb-2 text-xs font-bold uppercase text-slate-500 border-b-2 border-transparent transition whitespace-nowrap";
            });
            document.getElementById('view-' + t).classList.remove('hidden');
            document.getElementById('tab-' + t).className = "pb-2 text-xs font-bold uppercase text-[#d4af37] border-b-2 border-[#d4af37] transition whitespace-nowrap";
            if(t === 'discover') updateDiscover();
        }

        async function init() {
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json(); surahs = data.chapters;
            renderList(surahs);
            if(adhanActive) {
                const b = document.getElementById('adhan-btn');
                b.innerHTML = '<i class="fas fa-bell mr-1"></i> Alarme Abidjan (Activée)';
                b.classList.replace('text-slate-400', 'text-[#d4af37]');
                fetchPrayers();
            }
            if(localStorage.getItem('lastSurah')) document.getElementById('bookmark-box').classList.remove('hidden');
        }

        function renderList(data) {
            const l = document.getElementById('surah-list'); l.innerHTML = '';
            data.forEach(s => {
                const d = document.createElement('div');
                d.className = "flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700/50 cursor-pointer";
                d.onclick = () => play(s.id - 1);
                d.innerHTML = `<div class="flex items-center gap-4"><div class="w-8 h-8 rounded-full border border-slate-700 flex items-center justify-center text-[10px] text-[#d4af37]">${s.id}</div><div class="text-white text-sm font-bold">${s.name_simple}</div></div><h4 class="text-lg font-arabic text-[#d4af37]">${s.name_arabic}</h4>`;
                l.appendChild(d);
            });
        }

        function play(i) {
            currentIndex = i; const s = surahs[i];
            audio.src = `https://server8.mp3quran.net/afs/${String(s.id).padStart(3, '0')}.mp3`;
            document.getElementById('current-title').innerText = `${s.id}. ${s.name_simple}`;
            audio.play(); updateBtn(true); loadText(s.id, s.name_simple);
            localStorage.setItem('lastSurah', i);
        }

        function resumeLastSurah() {
            const l = localStorage.getItem('lastSurah');
            if(l) { play(parseInt(l)); document.getElementById('bookmark-box').classList.add('hidden'); }
        }

        async function loadText(id, name) {
            const c = document.getElementById('view-verses'); c.innerHTML = `<p class="text-center text-xs p-10">Chargement...</p>`;
            switchTab('verses');
            const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${id}?language=fr&translations=31&fields=text_uthmani&per_page=300`);
            const data = await res.json();
            let h = `<h2 class="text-center font-bold text-[#d4af37] mb-6 border-b border-slate-700 pb-2">${name}</h2>`;
            data.verses.forEach(v => h += `<div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50 mb-3"><p class="text-xl font-quran text-right leading-loose" dir="rtl">${v.text_uthmani}</p><p class="text-[11px] text-slate-400 mt-2">${v.translations[0].text}</p></div>`);
            c.innerHTML = h;
        }

        function filterSurahs() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderList(surahs.filter(s => s.name_simple.toLowerCase().includes(q)));
        }

        function updateBtn(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; }
        audio.ontimeupdate = () => { if(audio.duration) { 
            document.getElementById('progress-bar').value = (audio.currentTime/audio.duration)*100;
            document.getElementById('time-current').innerText = format(audio.currentTime);
            document.getElementById('time-total').innerText = format(audio.duration);
        }};
        function format(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        function togglePlay() { if(audio.paused) { audio.play(); updateBtn(true); } else { audio.pause(); updateBtn(false); } }

        init();
    </script>
</body>
</html>
