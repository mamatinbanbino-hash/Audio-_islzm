<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDIOS ISLAMIQUE | NDIAYE ADAMA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="audios-islamique-icon.png">
    <link rel="icon" type="image/png" href="audios-islamique-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        .font-quran { font-family: 'Amiri Quran', serif; }
        :root { --islam-gold: #d4af37; --bg-dark: #0f172a; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding-bottom: 160px; -webkit-tap-highlight-color: transparent; }
        .player-bar { background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(15px); border-top: 1px solid #334155; position: fixed; bottom: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--islam-gold); cursor: pointer; margin-top: -5px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #475569; border-radius: 2px; }
        .tab-btn.active { color: var(--islam-gold); border-bottom-color: var(--islam-gold); }
    </style>
</head>
<body class="bg-slate-900">
    <header class="p-6 text-center border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="flex justify-between items-center mb-2">
            <button onclick="requestNotificationPermission()" id="notif-btn" class="text-slate-500"><i class="fas fa-bell"></i></button>
            <div class="inline-flex items-center justify-center rounded-full border-2 border-[#d4af37] bg-slate-800 w-14 h-14 text-2xl text-[#d4af37]">🎧</div>
            <p id="hijri-date" class="text-[9px] text-slate-500 font-bold uppercase"></p>
        </div>
        <h1 class="text-2xl font-serif font-bold tracking-widest uppercase text-white">Audios <span class="text-[#d4af37]">Islamique</span></h1>
        <div class="mt-2 text-[10px] text-[#d4af37] bg-slate-800/80 inline-block px-3 py-1 rounded-full border border-[#d4af37]/30 shadow-sm">CRÉÉ PAR <span class="font-bold tracking-widest">NDIAYE ADAMA</span></div>
        <div class="mt-4">
            <button onclick="toggleAdhan()" id="adhan-btn" class="text-[10px] text-slate-400 border border-slate-700 bg-slate-800 px-4 py-1.5 rounded-full transition mb-2 shadow-sm"><i class="fas fa-bell-slash mr-1"></i> Alarme Abidjan</button>
            <div id="prayer-info" class="hidden"><p id="prayer-display" class="text-[9px] text-[#d4af37] uppercase font-bold tracking-widest"></p><p id="next-prayer-timer" class="text-[10px] text-white mt-1 font-mono"></p></div>
        </div>
    </header>

    <main class="px-4 py-6 max-w-2xl mx-auto">
        <div class="flex justify-between gap-2 mb-6 border-b border-slate-800 overflow-x-auto pb-1">
            <button id="tab-surahs" onclick="switchTab('surahs')" class="tab-btn active pb-2 text-[10px] font-bold uppercase whitespace-nowrap border-b-2 border-transparent text-slate-500">Sourates</button>
            <button id="tab-verses" onclick="switchTab('verses')" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap border-b-2 border-transparent text-slate-500">Lecture</button>
            <button id="tab-discover" onclick="switchTab('discover')" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap border-b-2 border-transparent text-slate-500">Découverte</button>
            <button id="tab-tools" onclick="switchTab('tools')" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap border-b-2 border-transparent text-slate-500">Outils</button>
        </div>

        <div id="view-surahs">
            <div id="bookmark-box" class="hidden mb-6 p-3 bg-[#d4af37]/10 border border-[#d4af37]/30 rounded-xl flex justify-between items-center"><p class="text-[10px] text-[#d4af37] uppercase font-bold">Reprendre ?</p><button onclick="resumeLastSurah()" class="text-[9px] bg-[#d4af37] text-slate-900 px-3 py-1 rounded-lg font-bold">LECTURE</button></div>
            <input type="text" id="search-input" onkeyup="filterSurahs()" placeholder="Chercher une sourate..." class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-2xl p-4 outline-none mb-6">
            <div id="surah-list" class="space-y-3"></div>
        </div>

        <div id="view-discover" class="hidden space-y-6">
            <div class="bg-slate-800/40 p-5 rounded-3xl border border-[#d4af37]/20 text-center shadow-lg"><h3 class="text-[#d4af37] text-[10px] font-bold uppercase mb-4 tracking-widest">Tasbih numérique</h3><div id="tasbih-display" class="text-5xl font-mono text-white mb-4">0</div><button onclick="incrementTasbih()" class="w-20 h-20 rounded-full bg-[#d4af37] text-slate-900 flex items-center justify-center text-3xl shadow-xl active:scale-90 mx-auto transition"><i class="fas fa-plus"></i></button><button onclick="resetTasbih()" class="block mx-auto mt-4 text-[9px] text-slate-500 uppercase">Reset</button></div>
            <div id="discover-content" class="space-y-6"></div>
        </div>

        <div id="view-tools" class="hidden space-y-6">
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-[#d4af37]/30">
                <h3 class="text-[#d4af37] text-[10px] font-bold uppercase mb-3">Calcul de Zakat (2.5%)</h3>
                <input type="number" id="zakat-val" placeholder="Montant..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs mb-3">
                <button onclick="calcZakat()" class="w-full bg-[#d4af37] text-slate-900 py-2 rounded font-bold text-xs uppercase">Calculer</button>
                <p id="zakat-res" class="mt-3 text-[#d4af37] font-bold text-center"></p>
            </div>
            <button onclick="resetApp()" class="w-full p-4 border border-red-500/30 text-red-400 text-[10px] uppercase rounded-xl">Réinitialiser l'Application</button>
            <div id="view-names" class="grid grid-cols-2 gap-3 pb-10"></div>
        </div>
        <div id="view-verses" class="hidden"></div>
    </main>

    <div class="player-bar p-4">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-3">
                <div class="overflow-hidden">
                    <h3 id="current-title" class="text-xs font-bold text-white truncate w-40">Choisir une sourate</h3>
                    <div class="flex items-center gap-2 mt-1">
                        <select id="reciter-select" onchange="localStorage.setItem('recIdx', this.value)" class="bg-slate-800 text-[8px] text-[#d4af37] border-none rounded p-1">
                            <option value="0">Alafasy</option><option value="1">AbdulBaset</option><option value="2">Muaiqly</option><option value="3">Al-Ghamdi</option>
                        </select>
                        <select onchange="audio.playbackRate = this.value" class="bg-slate-800 text-[8px] text-slate-400 border-none rounded p-1"><option value="1">1x</option><option value="0.75">0.75x</option><option value="1.5">1.5x</option></select>
                        <select onchange="setSleepTimer(this.value)" class="bg-slate-800 text-[8px] text-slate-400 border-none rounded p-1"><option value="0">Off</option><option value="15">15m</option><option value="30">30m</option></select>
                    </div>
                </div>
                <div id="playing-indicator" class="playing-anim hidden"><span></span><span></span><span></span></div>
            </div>
            <div class="flex items-center gap-3 mb-3"><span id="time-current" class="text-[9px] font-mono text-slate-400">0:00</span><input type="range" id="progress-bar" value="0" max="100" class="flex-1"><span id="time-total" class="text-[9px] font-mono text-slate-400">0:00</span></div>
            <div class="flex justify-center items-center gap-10">
                <button onclick="prevSurah()" class="text-slate-400"><i class="fas fa-step-backward text-xl"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-14 h-14 bg-[#d4af37] text-slate-900 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-play text-2xl ml-1"></i></button>
                <button onclick="nextSurah()" class="text-slate-400"><i class="fas fa-step-forward text-xl"></i></button>
            </div>
        </div>
    </div>
    <audio id="audio-player"></audio><audio id="adhan-player" src="https://ia800305.us.archive.org/21/items/AdhanMakkah/Adhan_Makkah.mp3"></audio>

    <script>
        const reciters = [{ s: "server8", f: "afs" }, { s: "server7", f: "basit" }, { s: "server12", f: "maher" }, { s: "server7", f: "s_ghamidi" }];
        function requestNotificationPermission() { Notification.requestPermission(); }
        
        // --- MESSAGE DE NDIAYE ADAMA ---
        function checkDailyMessage() {
            const now = new Date(); const hour = now.getHours(); const today = now.toDateString();
            if (hour >= 5 && hour <= 10 && localStorage.getItem('lastMorningMsg') !== today) {
                if (Notification.permission === "granted") {
                    new Notification("Message de NDIAYE ADAMA", { body: "Salam. Allah est le seul qui mérite notre adoration. Qu'Il illumine votre journée.", icon: "audios-islamique-icon.png" });
                    localStorage.setItem('lastMorningMsg', today);
                }
            }
        }

        async function fetchHijri() { const r = await fetch('https://api.aladhan.com/v1/gToH'); const d = await r.json(); document.getElementById('hijri-date').innerText = `${d.data.hijri.day} ${d.data.hijri.month.fr || d.data.hijri.month.en} ${d.data.hijri.year}`; }
        function calcZakat() { const v = document.getElementById('zakat-val').value; document.getElementById('zakat-res').innerText = v ? `Zakat : ${(v * 0.025).toLocaleString()} FCFA` : ""; }
        function resetApp() { if(confirm("Réinitialiser le Tasbih et l'historique ?")) { localStorage.clear(); location.reload(); } }
        let sleepTimeout = null;
        function setSleepTimer(m) { if(sleepTimeout) clearTimeout(sleepTimeout); if(m>0) sleepTimeout = setTimeout(() => { audio.pause(); updateBtn(false); }, m*60000); }

        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        let surahs = []; let adhanActive = localStorage.getItem('adhanActive') === 'true';

        async function init() {
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json(); surahs = data.chapters; renderList(surahs);
            if(adhanActive) {
                document.getElementById('adhan-btn').innerHTML = '<i class="fas fa-bell mr-1"></i> Alarme Abidjan (ON)';
                document.getElementById('adhan-btn').classList.replace('text-slate-400', 'text-[#d4af37]');
                document.getElementById('prayer-info').classList.remove('hidden'); fetchPrayers();
            }
            fetchHijri(); checkDailyMessage(); 
            document.getElementById('reciter-select').value = localStorage.getItem('recIdx') || 0;
            if(localStorage.getItem('lastSurah')) document.getElementById('bookmark-box').classList.remove('hidden');
        }

        async function fetchPrayers() {
            const r = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Abidjan&country=Cote%20d%27Ivoire&method=3');
            const d = await r.json(); const t = d.data.timings;
            document.getElementById('prayer-display').innerText = `Fajr ${t.Fajr} | Dhuhr ${t.Dhuhr} | Asr ${t.Asr} | Maghrib ${t.Maghrib} | Isha ${t.Isha}`;
            startWatcher(t);
        }

        function startWatcher(times) {
            setInterval(() => {
                const now = new Date(); const ct = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                if(["Fajr","Dhuhr","Asr","Maghrib","Isha"].some(p => ct === times[p] && now.getSeconds() < 10)) {
                    if(adhanActive) document.getElementById('adhan-player').play();
                }
            }, 10000);
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            ['surahs','verses','discover','tools'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
            if(t === 'tools') renderNames(); if(t === 'discover') updateDiscover();
        }

        async function renderNames() {
            const c = document.getElementById('view-names'); if(c.innerHTML!=="") return;
            const r = await fetch('https://api.aladhan.com/v1/asmaAlHusna');
            const d = await r.json(); d.data.forEach(n => c.innerHTML += `<div class="bg-slate-800/40 p-4 rounded-xl border border-slate-700 text-center"><p class="text-[#d4af37] font-quran text-xl">${n.name}</p><p class="text-white text-[10px] uppercase">${n.transliteration}</p></div>`);
        }

        function renderList(d) {
            const l = document.getElementById('surah-list'); l.innerHTML = '';
            d.forEach((s, i) => l.innerHTML += `<div onclick="play(${i}, ${s.id})" class="flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700 cursor-pointer"><div class="flex items-center gap-4"><div class="text-[10px] text-[#d4af37]">${s.id}</div><div class="text-white text-sm font-bold">${s.name_simple}</div></div><h4 class="text-lg font-arabic text-[#d4af37]">${s.name_arabic}</h4></div>`);
        }

        function play(i, id) {
            const r = reciters[document.getElementById('reciter-select').value];
            audio.src = `https://${r.s}.mp3quran.net/${r.f}/${String(id).padStart(3,'0')}.mp3`;
            document.getElementById('current-title').innerText = surahs[i].name_simple;
            audio.play(); updateBtn(true); localStorage.setItem('lastSurah', i); loadText(id, surahs[i].name_simple);
        }

        async function loadText(id, name) {
            const c = document.getElementById('view-verses'); c.innerHTML = '<p class="text-center p-10">Chargement...</p>';
            switchTab('verses'); const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${id}?language=fr&translations=31&fields=text_uthmani&per_page=300`);
            const d = await res.json(); let h = `<h2 class="text-center font-bold text-[#d4af37] mb-6 border-b border-slate-700 pb-2">${name}</h2>`;
            d.verses.forEach(v => h += `<div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/50 mb-3"><p class="text-xl font-quran text-right leading-loose" dir="rtl">${v.text_uthmani}</p><p class="text-[11px] text-slate-400 mt-2">${v.translations[0].text}</p></div>`);
            c.innerHTML = h;
        }

        function updateDiscover() {
            const d = ["Le Paradis est sous les pieds des mères.", "Invoquez Allah avec certitude d'être exaucé.", "La patience est une lumière."];
            document.getElementById('discover-content').innerHTML = `<div class="bg-slate-800/40 p-5 rounded-2xl border border-[#d4af37]/30 text-xs italic text-center">"${d[Math.floor(Math.random()*d.length)]}"</div>`;
        }

        function toggleAdhan() { adhanActive = !adhanActive; localStorage.setItem('adhanActive', adhanActive); location.reload(); }
        let tCount = parseInt(localStorage.getItem('tCount')) || 0;
        document.getElementById('tasbih-display').innerText = tCount;
        function incrementTasbih() { tCount++; document.getElementById('tasbih-display').innerText = tCount; localStorage.setItem('tCount', tCount); }
        function resetTasbih() { tCount = 0; document.getElementById('tasbih-display').innerText = 0; localStorage.setItem('tCount', 0); }
        function togglePlay() { if(audio.paused) { audio.play(); updateBtn(true); } else { audio.pause(); updateBtn(false); } }
        function updateBtn(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; if(p) document.getElementById('playing-indicator').classList.remove('hidden'); else document.getElementById('playing-indicator').classList.add('hidden'); }
        audio.ontimeupdate = () => { if(audio.duration) { document.getElementById('progress-bar').value = (audio.currentTime/audio.duration)*100; document.getElementById('time-current').innerText = format(audio.currentTime); document.getElementById('time-total').innerText = format(audio.duration); }};
        function format(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        init();
    </script>
</body>
</html>
